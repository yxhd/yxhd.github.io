<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C4D / AIGC 三维作品展示</title>
    <style>
        /* ============================================================
           全局重置 & 基础 (深色主题)
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ----- 拖尾 Canvas (层级最低) ----- */
        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* ----- 顶部导航 (深色半透明) ----- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.25s ease;
        }

        .navbar .logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.3px;
            color: #f0f0f0;
            text-decoration: none;
        }

        .navbar .logo span {
            color: #888;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #d0d0d0;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 0;
            height: 2px;
            background: #f0f0f0;
            transition: width 0.25s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* ----- 区块通用 (深色背景) ----- */
        .section {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 40px 60px;
            scroll-margin-top: 74px;
            background: #0a0a0a;
        }

        .section-title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 32px;
            color: #f0f0f0;
            text-align: center;
        }

        .section-sub {
            font-size: 16px;
            color: #999;
            text-align: center;
            max-width: 520px;
            margin-bottom: 28px;
        }

        /* ============================================================
           Banner — 视频背景
           ============================================================ */
        #banner {
            justify-content: center;
            text-align: center;
            padding-top: 100px;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
        }

        #banner-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
        }

        #banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.50);
            z-index: 1;
        }

        .banner-overlay {
            position: relative;
            z-index: 2;
        }

        #banner h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
            color: #ffffff;
        }

        #banner h1 em {
            font-style: normal;
            background: linear-gradient(135deg, #f0f0f0 30%, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #banner p {
            font-size: 18px;
            color: #d0d0d0;
            max-width: 480px;
            margin: 0 auto 12px;
            line-height: 1.6;
        }

        .banner-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            font-size: 13px;
            color: #ccc;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.05);
        }

        /* ============================================================
           轮播容器 — 更大尺寸
           ============================================================ */
        .carousel-wrapper {
            width: 100%;
            max-width: 1600px;
            /* 放宽至1600px */
            margin: 0 auto;
            position: relative;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 18px;
            background: #141414;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            aspect-ratio: 16 / 9;
        }

        .carousel-track {
            display: flex;
            align-items: center;
            height: 100%;
            will-change: transform;
            transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .carousel-item {
            flex: 0 0 auto;
            height: 100%;
            margin: 0 2px;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            background: #1e1e1e;
            transition: opacity 0.45s ease, transform 0.45s ease, filter 0.45s ease;
            opacity: 0;
            transform: scale(0.78);
            filter: brightness(0.5) saturate(0.4);
            pointer-events: none;
            will-change: transform, opacity;
            flex-shrink: 0;
        }

        .carousel-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a1a1a;
        }

        /* ---------- 三种可见状态 (使用 !important 锁定) ---------- */
        .carousel-item.center {
            opacity: 1 !important;
            transform: scale(1.18) !important;
            /* 从1.12提升到1.18，更大 */
            filter: brightness(1) saturate(1) !important;
            pointer-events: auto !important;
            z-index: 10;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .carousel-item.left {
            opacity: 0.45 !important;
            transform: scale(0.78) !important;
            filter: brightness(0.5) saturate(0.4) !important;
            pointer-events: auto !important;
            z-index: 5;
        }

        .carousel-item.right {
            opacity: 0.45 !important;
            transform: scale(0.78) !important;
            filter: brightness(0.5) saturate(0.4) !important;
            pointer-events: auto !important;
            z-index: 5;
        }

        .carousel-item.hidden {
            opacity: 0 !important;
            transform: scale(0.7) !important;
            filter: brightness(0.2) saturate(0.2) !important;
            pointer-events: none !important;
            z-index: 0;
        }

        /* ----- 轮播箭头 ----- */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            color: #f0f0f0;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .carousel-btn:hover {
            background: rgba(40, 40, 40, 0.95);
            transform: translateY(-50%) scale(1.04);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.7);
        }

        .carousel-btn:active {
            transform: translateY(-50%) scale(0.94);
        }

        .carousel-btn.prev {
            left: 20px;
        }

        .carousel-btn.next {
            right: 20px;
        }

        /* ----- 联系页 ----- */
        #contact {
            text-align: center;
            justify-content: center;
            gap: 12px;
        }

        #contact .contact-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }

        #contact a {
            color: #d0d0d0;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        #contact a:hover {
            border-color: #f0f0f0;
        }

        .contact-links {
            display: flex;
            gap: 36px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        .contact-links a {
            font-size: 17px;
            font-weight: 450;
        }

        /* ----- 回到顶部按钮 ----- */
        #back-to-top {
            position: fixed;
            bottom: 36px;
            right: 36px;
            z-index: 999;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: rgba(20, 20, 20, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            font-size: 22px;
            color: #f0f0f0;
            transition: opacity 0.35s ease, transform 0.3s ease, box-shadow 0.3s;
            opacity: 0;
            transform: translateY(12px) scale(0.92);
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #back-to-top.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        #back-to-top:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            transform: translateY(-2px) scale(1.02);
            background: rgba(40, 40, 40, 0.96);
        }

        /* ----- 响应式 ----- */
        @media (max-width: 1024px) {
            .carousel-wrapper {
                max-width: 100%;
                padding: 0 16px;
            }
        }

        @media (max-width: 820px) {
            .navbar {
                padding: 12px 20px;
            }
            .nav-links {
                gap: 18px;
            }
            .nav-links a {
                font-size: 14px;
            }
            .section {
                padding: 80px 20px 40px;
            }
            #banner h1 {
                font-size: 38px;
            }
            .carousel-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .carousel-btn.prev {
                left: 10px;
            }
            .carousel-btn.next {
                right: 10px;
            }
            .section-title {
                font-size: 26px;
            }
            .carousel-container {
                aspect-ratio: 16 / 10;
            }
            .carousel-wrapper {
                padding: 0 10px;
            }
        }

        @media (max-width: 500px) {
            .navbar .logo {
                font-size: 17px;
            }
            .nav-links {
                gap: 12px;
            }
            .nav-links a {
                font-size: 13px;
            }
            #banner h1 {
                font-size: 28px;
            }
            .carousel-btn {
                width: 34px;
                height: 34px;
                font-size: 16px;
            }
            .section {
                padding: 70px 14px 30px;
            }
            #back-to-top {
                width: 44px;
                height: 44px;
                font-size: 18px;
                bottom: 20px;
                right: 20px;
            }
            .contact-links {
                gap: 20px;
            }
            .contact-links a {
                font-size: 15px;
            }
            .carousel-wrapper {
                padding: 0 6px;
            }
        }

        /* 辅助 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .carousel-item video::-webkit-media-controls {
            display: none !important;
        }
        .carousel-item video {
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== 拖尾 Canvas ===== -->
    <canvas id="trail-canvas"></canvas>

    <!-- ===== 导航 ===== -->
    <nav class="navbar" role="navigation">
        <a href="#banner" class="logo">C4D<span>·</span>AIGC</a>
        <ul class="nav-links">
            <li><a href="#banner">首页</a></li>
            <li><a href="#animation">三维动画</a></li>
            <li><a href="#tvc">TVC广告</a></li>
            <li><a href="#product">产品渲染</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <!-- ============================================================
    Banner — 视频背景
    ============================================================ -->
    <section id="banner" class="section">
        <!-- 背景视频 -->
        <video id="banner-video" autoplay muted loop playsinline preload="metadata">
            <source src="resource/banner/banner.mp4" type="video/mp4" />
            <!-- 如果视频加载失败，显示纯色背景 -->
        </video>
        <div class="banner-overlay">
            <h1>三维视觉 <em>叙事</em></h1>
            <p>C4D 动态设计 · AIGC 生成影像 · 产品可视化</p>
            <span class="banner-badge">✦ 作品集 2026</span>
        </div>
    </section>

    <!-- ===== 三维动画轮播 ===== -->
    <section id="animation" class="section">
        <h2 class="section-title">三维动画</h2>
        <p class="section-sub">C4D 角色动画 · 粒子系统 · 风格化渲染</p>
        <div class="carousel-wrapper" data-carousel="anim">
            <div class="carousel-container" id="carousel-anim">
                <div class="carousel-track" id="track-anim"></div>
                <button class="carousel-btn prev" aria-label="上一个">‹</button>
                <button class="carousel-btn next" aria-label="下一个">›</button>
            </div>
        </div>
    </section>

    <!-- ===== TVC广告轮播 ===== -->
    <section id="tvc" class="section">
        <h2 class="section-title">TVC 广告</h2>
        <p class="section-sub">品牌视觉短片 · 动态分镜 · 后期合成</p>
        <div class="carousel-wrapper" data-carousel="tvc">
            <div class="carousel-container" id="carousel-tvc">
                <div class="carousel-track" id="track-tvc"></div>
                <button class="carousel-btn prev" aria-label="上一个">‹</button>
                <button class="carousel-btn next" aria-label="下一个">›</button>
            </div>
        </div>
    </section>

    <!-- ===== 工业产品渲染轮播 ===== -->
    <section id="product" class="section">
        <h2 class="section-title">工业产品渲染</h2>
        <p class="section-sub">写实材质 · 光影表现 · 商业静帧</p>
        <div class="carousel-wrapper" data-carousel="product">
            <div class="carousel-container" id="carousel-product">
                <div class="carousel-track" id="track-product"></div>
                <button class="carousel-btn prev" aria-label="上一个">‹</button>
                <button class="carousel-btn next" aria-label="下一个">›</button>
            </div>
        </div>
    </section>

    <!-- ===== 联系页 ===== -->
    <section id="contact" class="section">
        <div class="contact-icon">✉</div>
        <h2 class="section-title" style="margin-bottom:8px;">联系</h2>
        <p style="color:#aaa; max-width:400px; margin-bottom:16px; text-align:center;">
            作品合作 · 创意咨询 · 远程协作
        </p>
        <div class="contact-links">
            <a href="mailto:hello@c4d.work">hello@c4d.work</a>
            <a href="#">Instagram</a>
            <a href="#">Behance</a>
        </div>
        <p style="margin-top:28px; font-size:14px; color:#555;">© 2026 C4D·AIGC</p>
    </section>

    <!-- ===== 回到顶部按钮 ===== -->
    <button id="back-to-top" aria-label="回到顶部">↑</button>

    <script>
        (function() {
            'use strict';

            // ================================================================
            //  1. 配置 (严格按照 resource/ 路径规范)
            // ================================================================

            const CAROUSEL_DATA = {
                anim: {
                    title: '三维动画',
                    folder: '三维动画',
                    count: 5
                },
                tvc: {
                    title: 'TVC广告',
                    folder: 'TVC广告',
                    count: 4
                },
                product: {
                    title: '工业产品渲染',
                    folder: '工业产品渲染',
                    count: 6
                }
            };

            function generateVideoPaths(category) {
                const data = CAROUSEL_DATA[category];
                if (!data) return [];
                const paths = [];
                for (let i = 1; i <= data.count; i++) {
                    paths.push('resource/' + data.folder + '/' + i + '.mp4');
                }
                return paths;
            }

            // ================================================================
            //  2. 工具函数
            // ================================================================

            function safeGet(selector, parent) {
                const ctx = parent || document;
                const el = ctx.querySelector(selector);
                if (!el) console.warn('[safeGet] 未找到:', selector);
                return el;
            }

            function isValidNumber(v) {
                return typeof v === 'number' && !isNaN(v) && isFinite(v);
            }

            // ================================================================
            //  3. 轮播类 — 放大至 93% 宽度，中间 scale 1.18
            // ================================================================

            class Carousel {
                constructor(id, videoPaths, options = {}) {
                    this.id = id;
                    this.videoPaths = videoPaths || [];
                    this.count = this.videoPaths.length;
                    this.initialIndex = (this.count >= 2) ? 1 : 0;
                    this.itemWidth = 280;
                    this.gap = 2;
                    this.interval = options.interval || 2000;

                    this.currentIndex = this.initialIndex;
                    this.isPlaying = true;
                    this.timer = null;
                    this.isHovered = false;
                    this.isTransitioning = false;

                    this.container = safeGet('#' + id);
                    this.track = safeGet('.carousel-track', this.container);
                    this.prevBtn = safeGet('.carousel-btn.prev', this.container);
                    this.nextBtn = safeGet('.carousel-btn.next', this.container);
                    this.items = [];

                    this._buildItems();
                    this._bindEvents();
                    this.update(true);
                    this._startAutoPlay();

                    this._resizeHandler = this._debounce(() => {
                        if (this.container) this.update(true);
                    }, 180);
                    window.addEventListener('resize', this._resizeHandler);
                }

                _buildItems() {
                    if (!this.track) return;
                    this.track.innerHTML = '';
                    this.items = [];
                    const paths = this.videoPaths;
                    if (!paths || paths.length === 0) {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'carousel-item center';
                        placeholder.textContent = '暂无素材';
                        placeholder.style.cssText =
                            'display:flex;align-items:center;justify-content:center;background:#222;color:#888;font-size:18px;';
                        this.track.appendChild(placeholder);
                        this.items = [placeholder];
                        this.count = 1;
                        this.initialIndex = 0;
                        this.currentIndex = 0;
                        return;
                    }
                    paths.forEach((src) => {
                        const item = document.createElement('div');
                        item.className = 'carousel-item hidden';
                        const video = document.createElement('video');
                        video.src = src;
                        video.muted = true;
                        video.loop = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.onerror = function() {
                            this.style.background = '#2a2a2a';
                            this.style.minHeight = '100%';
                        };
                        item.appendChild(video);
                        this.track.appendChild(item);
                        this.items.push(item);
                    });
                    this.count = this.items.length;
                    if (this.count < 2) {
                        this.initialIndex = 0;
                        this.currentIndex = 0;
                    } else if (this.currentIndex >= this.count) {
                        this.currentIndex = this.count - 1;
                    }
                }

                _bindEvents() {
                    if (this.prevBtn) {
                        this.prevBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this._goTo(this.currentIndex - 1);
                        });
                    }
                    if (this.nextBtn) {
                        this.nextBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            this._goTo(this.currentIndex + 1);
                        });
                    }
                    if (this.container) {
                        this.container.addEventListener('mouseenter', () => {
                            this.isHovered = true;
                            this._pauseAutoPlay();
                        });
                        this.container.addEventListener('mouseleave', () => {
                            this.isHovered = false;
                            if (this.isPlaying) this._startAutoPlay();
                        });
                    }
                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            const active = document.activeElement;
                            if (active && this.container && this.container.contains(active)) {
                                e.preventDefault();
                                this._goTo(this.currentIndex + (e.key === 'ArrowRight' ? 1 : -1));
                            }
                        }
                    });
                }

                update(instant) {
                    if (this.count === 0) return;
                    if (this.currentIndex < 0) this.currentIndex = this.count - 1;
                    if (this.currentIndex >= this.count) this.currentIndex = 0;

                    // ---- 动态计算 itemWidth：占容器宽度的 93% (大幅放大) ----
                    const containerWidth = this.container ? this.container.clientWidth : 800;
                    const safeWidth = (isValidNumber(containerWidth) && containerWidth > 0) ? containerWidth : 800;
                    let dynamicWidth = safeWidth * 0.93;
                    dynamicWidth = Math.min(Math.max(dynamicWidth, 200), 1400);
                    this.itemWidth = dynamicWidth;

                    this.items.forEach(item => {
                        item.style.flex = '0 0 ' + this.itemWidth + 'px';
                        item.style.margin = '0 ' + this.gap + 'px';
                    });

                    // ---- 分配状态类 ----
                    const total = this.count;
                    const cur = this.currentIndex;
                    const leftIdx = (cur - 1 + total) % total;
                    const rightIdx = (cur + 1) % total;

                    this.items.forEach((item, idx) => {
                        item.classList.remove('center', 'left', 'right', 'hidden');
                        if (idx === cur) {
                            item.classList.add('center');
                            const video = item.querySelector('video');
                            if (video) video.play().catch(() => {});
                        } else if (idx === leftIdx) {
                            item.classList.add('left');
                            const video = item.querySelector('video');
                            if (video) video.pause();
                        } else if (idx === rightIdx) {
                            item.classList.add('right');
                            const video = item.querySelector('video');
                            if (video) video.pause();
                        } else {
                            item.classList.add('hidden');
                            const video = item.querySelector('video');
                            if (video) video.pause();
                        }
                    });

                    // ---- 偏移计算 ----
                    const itemTotalWidth = this.itemWidth + this.gap * 2;
                    const offset = -(cur * itemTotalWidth) + (safeWidth / 2 - this.itemWidth / 2);

                    if (isValidNumber(offset) && this.track) {
                        if (instant) {
                            this.track.style.transition = 'none';
                            this.track.style.transform = 'translateX(' + offset + 'px)';
                            void this.track.offsetHeight;
                            this.track.style.transition = '';
                        } else {
                            this.track.style.transform = 'translateX(' + offset + 'px)';
                        }
                    }
                }

                _goTo(index) {
                    if (this.isTransitioning || this.count === 0) return;
                    let target = index;
                    if (target < 0) target = this.count - 1;
                    if (target >= this.count) target = 0;
                    if (target === this.currentIndex) {
                        this._resetAutoPlayTimer();
                        return;
                    }
                    this.isTransitioning = true;
                    this.currentIndex = target;
                    this.update(false);
                    setTimeout(() => { this.isTransitioning = false; }, 580);
                    this._resetAutoPlayTimer();
                }

                _startAutoPlay() {
                    if (this.timer) clearInterval(this.timer);
                    if (!this.isPlaying || this.isHovered || this.count < 2) return;
                    this.timer = setInterval(() => {
                        if (this.isHovered || this.isTransitioning) return;
                        const next = (this.currentIndex + 1) % this.count;
                        this._goTo(next);
                    }, this.interval);
                }

                _pauseAutoPlay() {
                    if (this.timer) { clearInterval(this.timer);
                        this.timer = null; }
                }

                _resetAutoPlayTimer() {
                    if (this.isPlaying && !this.isHovered) {
                        this._pauseAutoPlay();
                        this._startAutoPlay();
                    }
                }

                destroy() {
                    this._pauseAutoPlay();
                    window.removeEventListener('resize', this._resizeHandler);
                    this.items = [];
                    this.track = null;
                    this.container = null;
                }

                _debounce(fn, delay) {
                    let timer = null;
                    return function(...args) {
                        if (timer) clearTimeout(timer);
                        timer = setTimeout(() => { fn.apply(this, args);
                            timer = null; }, delay);
                    };
                }
            }

            // ================================================================
            //  4. 初始化轮播
            // ================================================================

            const carousels = {};

            function initCarousels() {
                const map = {
                    'carousel-anim': 'anim',
                    'carousel-tvc': 'tvc',
                    'carousel-product': 'product'
                };
                Object.keys(map).forEach((containerId) => {
                    const key = map[containerId];
                    const videoPaths = generateVideoPaths(key);
                    if (!videoPaths || videoPaths.length === 0) {
                        console.warn('[initCarousels] 无素材:', key);
                        return;
                    }
                    try {
                        const carousel = new Carousel(containerId, videoPaths, {
                            interval: 2000,
                        });
                        carousels[key] = carousel;
                        console.log('[Carousel] 初始化成功:', key, '素材数:', videoPaths.length);
                    } catch (err) {
                        console.error('[Carousel] 初始化失败:', key, err);
                    }
                });
            }

            // ================================================================
            //  5. 鼠标拖尾 (全域, 深灰色)
            // ================================================================

            function initTrail() {
                const canvas = document.getElementById('trail-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let width = window.innerWidth,
                    height = window.innerHeight;
                const MAX_POINTS = 40;
                const points = [];
                const particles = [];
                const MAX_PARTICLES = 28;
                let mouseX = -9999,
                    mouseY = -9999;
                let isMouseOnPage = false;

                function resizeCanvas() {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                    draw();
                }

                function draw() {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, width, height);
                    if (!isMouseOnPage || mouseX < 0 || mouseY < 0) return;

                    // 拖尾线条
                    if (points.length > 1) {
                        for (let i = 1; i < points.length; i++) {
                            const p0 = points[i - 1],
                                p1 = points[i];
                            const progress = i / points.length;
                            const alpha = 0.15 + 0.55 * progress;
                            const lineWidth = 1.2 + 3.6 * progress;
                            ctx.beginPath();
                            ctx.moveTo(p0.x, p0.y);
                            ctx.lineTo(p1.x, p1.y);
                            ctx.strokeStyle = 'rgba(180, 180, 185, ' + alpha + ')';
                            ctx.lineWidth = lineWidth;
                            ctx.lineCap = 'round';
                            ctx.stroke();
                            const alpha2 = 0.04 + 0.18 * progress;
                            ctx.beginPath();
                            ctx.moveTo(p0.x, p0.y);
                            ctx.lineTo(p1.x, p1.y);
                            ctx.strokeStyle = 'rgba(255,255,255,' + alpha2 + ')';
                            ctx.lineWidth = 0.8 + 1.6 * progress;
                            ctx.stroke();
                        }
                    }

                    // 粒子
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.02;
                        p.life -= 0.012;
                        p.size *= 0.994;
                        if (p.life <= 0 || p.size < 0.3) {
                            particles.splice(i, 1);
                            continue;
                        }
                    }
                    if (isMouseOnPage && mouseX > 0 && mouseY > 0) {
                        const count = Math.floor(1.2 + Math.random() * 1.8);
                        for (let i = 0; i < count; i++) {
                            if (particles.length >= MAX_PARTICLES) break;
                            const angle = Math.random() * Math.PI * 2;
                            const speed = 0.4 + Math.random() * 1.6;
                            particles.push({
                                x: mouseX + (Math.random() - 0.5) * 10,
                                y: mouseY + (Math.random() - 0.5) * 10,
                                vx: Math.cos(angle) * speed * (0.3 + Math.random() * 0.7),
                                vy: Math.sin(angle) * speed * (0.3 + Math.random() * 0.7) - 0.6,
                                size: 2.2 + Math.random() * 3.6,
                                life: 0.6 + Math.random() * 0.6,
                                maxLife: 1.2,
                            });
                        }
                    }
                    particles.forEach((p) => {
                        const alpha = Math.max(0, p.life / p.maxLife * 0.7);
                        const size = Math.max(0.3, p.size);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(180, 180, 185, ' + alpha + ')';
                        ctx.fill();
                        if (size > 1.5) {
                            ctx.beginPath();
                            ctx.arc(p.x - size * 0.2, p.y - size * 0.2, size * 0.3, 0, Math.PI * 2);
                            ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 0.2) + ')';
                            ctx.fill();
                        }
                    });
                    requestAnimationFrame(draw);
                }

                function onMove(e) {
                    let clientX, clientY;
                    if (e.touches) {
                        const touch = e.touches[0];
                        if (!touch) return;
                        clientX = touch.clientX;
                        clientY = touch.clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    if (clientX < 0 || clientY < 0 || clientX > width || clientY > height) return;
                    mouseX = clientX;
                    mouseY = clientY;
                    isMouseOnPage = true;
                    points.push({ x: mouseX, y: mouseY });
                    if (points.length > MAX_POINTS) points.shift();
                }

                function onLeave() { isMouseOnPage = false; }

                function onEnter() { isMouseOnPage = true; }

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseleave', onLeave);
                document.addEventListener('mouseenter', onEnter);
                document.addEventListener('touchmove', onMove, { passive: true });
                document.addEventListener('touchend', () => { isMouseOnPage = false; });
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                window._trailCleanup = function() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseleave', onLeave);
                    document.removeEventListener('mouseenter', onEnter);
                    document.removeEventListener('touchmove', onMove);
                    window.removeEventListener('resize', resizeCanvas);
                };
                console.log('[Trail] 拖尾已启动');
            }

            // ================================================================
            //  6. 回到顶部
            // ================================================================

            function initBackToTop() {
                const btn = document.getElementById('back-to-top');
                if (!btn) return;
                let ticking = false;

                function checkScroll() {
                    const scrollY = window.pageYOffset || document.documentElement.scrollTop;
                    btn.classList.toggle('visible', scrollY > 300);
                    ticking = false;
                }
                window.addEventListener('scroll', function() {
                    if (!ticking) {
                        window.requestAnimationFrame(function() { checkScroll();
                            ticking = false; });
                        ticking = true;
                    }
                });
                btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
                checkScroll();
            }

            // ================================================================
            //  7. 导航平滑
            // ================================================================

            function initNavSmooth() {
                const links = document.querySelectorAll('.nav-links a');
                links.forEach(link => {
                    link.addEventListener('click', function(e) {
                        const href = this.getAttribute('href');
                        if (href && href.startsWith('#')) {
                            e.preventDefault();
                            const target = document.querySelector(href);
                            if (target) {
                                const navHeight = document.querySelector('.navbar')?.offsetHeight || 74;
                                const targetPos = target.getBoundingClientRect().top + window.pageYOffset -
                                    navHeight - 8;
                                window.scrollTo({ top: targetPos, behavior: 'smooth' });
                            }
                        }
                    });
                });
            }

            // ================================================================
            //  8. 启动
            // ================================================================

            document.addEventListener('DOMContentLoaded', function() {
                initCarousels();
                initTrail();
                initBackToTop();
                initNavSmooth();
                setTimeout(() => {
                    Object.values(carousels).forEach(c => { try { c.update(true); } catch (e) {} });
                }, 300);
                console.log('[App] 所有模块初始化完成');
            });

            window.addEventListener('beforeunload', function() {
                if (window._trailCleanup) window._trailCleanup();
                Object.values(carousels).forEach(c => { try { c.destroy(); } catch (e) {} });
            });

        })();
    </script>
</body>
